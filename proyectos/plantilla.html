<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Nombre del Proyecto</title>

    <a class="idioma" id="btnIdioma">ES</a>

<main class="contenedor-proyecto">

    <a href="../../index-port.html" class="btn-regresar">
        <svg viewBox="0 0 32 32" width="25px" xmlns="http://www.w3.org/2000/svg">
            <line fill="none" stroke="#FFFFFF" stroke-width="3" x1="6" y1="16" x2="28" y2="16"/>
            <polyline fill="none" stroke="#FFFFFF" stroke-width="3" points="14,24.5 5.5,16 14,7.5 "/>
        </svg>

    <header class="proyecto-header-center">

    <section class="banner-principal">

        </div>

        <div class="etiqueta-verde-borde">Competencias técnicas</div>
        <div class="tags-contenedor">
            <span class="tag-verde-claro">UI/UX Design</span>
            <span class="tag-verde-claro">Responsive Design</span>
        </div>
    </section>

    <section class="galeria-pruebas">
        <img src="/proyectos/" class="img-redondeada secundaria" alt="Prueba 1">
        <img src="/proyectos/" class="img-redondeada secundaria" alt="Prueba 2">
        <img src="/proyectos/" class="img-redondeada secundaria" alt="Prueba 3">

<script src="../../js/traductor.js"></script>
